/**:
    ros__parameters:
        use_sim_time: false

        use_imu_as_input: false   # IMU-as-output mode (KF outputs include IMU bias)
        runtime_pos_log_enable: false

        filter_size_surf_min: 0.5
        filter_size_map_min: 0.5

        common:
            # Cloud is rotated to base orientation by go2w_transform_sensor and
            # restamped to the host wall clock (same domain as /go2w/imu).
            lid_topic: "/utlidar/transformed_cloud"
            imu_topic: "/go2w/imu"
            con_frame: false
            con_frame_num: 1
            # Cut each 65 ms L1 scan into ~3 sub-frames of ~22 ms so each
            # KF update covers a smaller motion window. Drastically reduces
            # intra-scan deskew error during aggressive rotation/translation.
            # Smaller sub-frames = less intra-scan motion per KF update.
            # 0.011 s -> ~6 sub-frames per 65 ms L1 scan.
            cut_frame: true
            cut_frame_time_interval: 0.011
            time_lag_imu_to_lidar: 0.0

        preprocess:
            # 5 = UNILIDAR handler in this fork; reads x,y,z,intensity,time
            # which is exactly the field layout our transform_cloud preserves.
            lidar_type: 5
            scan_line: 18
            timestamp_unit: 0   # `time` field unit is seconds
            blind: 0.5

        mapping:
            imu_en: true
            start_in_aggressive_motion: true   # robot may start while moving
            extrinsic_est_en: false       # locked to KF-converged values below
            imu_time_inte: 0.002          # /go2w/imu = /lowstate at 500 Hz (FREQ_DIV=1)
            # Raised from 30/35 — Go2W aggressive trot can spike >3g momentarily
            # and yaw rates exceeding 2000 deg/s during fast spins. Saturated
            # IMU samples corrupt the bias estimate, persists as drift.
            satu_acc: 50.0
            satu_gyro: 50.0
            acc_norm: 9.81
            lidar_meas_cov: 0.01
            acc_cov_output: 500.0
            gyr_cov_output: 1000.0
            b_acc_cov: 0.0001
            b_gyr_cov: 0.0001
            imu_meas_acc_cov: 0.1
            imu_meas_omg_cov: 0.1
            gyr_cov_input: 0.01
            acc_cov_input: 0.1
            plane_thr: 0.1
            match_s: 81.0
            fov_degree: 360.0
            det_range: 100.0

            gravity_align: true
            # IMU /go2w/imu measured stationary magnitude = 9.58 m/s^2 (not 9.81)
            # via data_diag. 2.3% scale/bias error. Setting yaml to actual value
            # eliminates -0.23 m/s^2 constant residual that integrates to drift.
            gravity: [ 0.0, 0.0, -9.58 ]
            gravity_init: [ 0.0, 0.0, -9.58 ]

            # Locked to KF-converged values from extrinsic_est_en=true session.
            # T converged near zero (NOT the geometric 0.315 m lever arm) — strongly
            # suggests /utlidar/cloud already has the lidar-to-body translation
            # compensated by Unitree firmware. Residual R is sub-1° refinement
            # on top of go2w_transform_sensor's rotation.
            extrinsic_T: [ -0.0153, -0.0015, -0.001 ]
            extrinsic_R: [  1.0,         0.00704,    0.0107,
                           -0.0070,      1.0,       -0.0037,
                           -0.0107,      0.0036,     1.0    ]

        odometry:
            publish_odometry_without_downsample: true

        publish:
            path_en: true
            scan_publish_en: true
            scan_bodyframe_pub_en: false

        pcd_save:
            pcd_save_en: false
            interval: -1
