# MoveIt-level velocity/acceleration scaling for trajectory generation.
# Hardware limits already come from the URDF <limit> tags; these add motion
# planning constraints on top.
default_velocity_scaling_factor: 0.3
default_acceleration_scaling_factor: 0.3

joint_limits:
  joint1:
    has_velocity_limits: true
    max_velocity: 4.8
    has_acceleration_limits: true
    max_acceleration: 10.0
  joint2:
    has_velocity_limits: true
    max_velocity: 4.8
    has_acceleration_limits: true
    max_acceleration: 10.0
  joint3:
    has_velocity_limits: true
    max_velocity: 4.8
    has_acceleration_limits: true
    max_acceleration: 10.0
  joint4:
    has_velocity_limits: true
    max_velocity: 4.8
    has_acceleration_limits: true
    max_acceleration: 10.0
  joint5:
    has_velocity_limits: true
    max_velocity: 4.8
    has_acceleration_limits: true
    max_acceleration: 10.0
  joint6:
    has_velocity_limits: true
    max_velocity: 4.8
    has_acceleration_limits: true
    max_acceleration: 10.0
  gripper:
    has_velocity_limits: true
    max_velocity: 4.8
    has_acceleration_limits: true
    max_acceleration: 10.0
  gripper_sub:
    has_velocity_limits: true
