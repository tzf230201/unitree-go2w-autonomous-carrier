# Wrapped in a single `/**:` (wildcard namespace) per
# ROBOTIS-GIT/open_manipulator's hardware_controller_manager.yaml pattern, so
# these params bind to controller_manager and all OM6DOF controllers
# regardless of what namespace ros2_control_node is launched under.
# NOTE: must be ONE /**: key with all nodes nested under it — repeating
# "/**:" as a top-level key multiple times in the same YAML file is a
# duplicate-key collision (last one silently wins, the rest are dropped).
/**:
  controller_manager:
    ros__parameters:
      use_sim_time: False
      update_rate: 100  # Hz

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

      arm_controller:
        type: joint_trajectory_controller/JointTrajectoryController

      forward_position_controller:
        type: forward_command_controller/ForwardCommandController

      gripper_controller:
        type: position_controllers/GripperActionController

  # ----- arm joint trajectory controller (6 DOF) -----
  arm_controller:
    ros__parameters:
      joints:
        - joint1
        - joint2
        - joint3
        - joint4
        - joint5
        - joint6

      command_interfaces:
        - position

      state_interfaces:
        - position
        - velocity

      state_publish_rate: 100.0
      action_monitor_rate: 20.0

      allow_partial_joints_goal: false
      open_loop_control: false
      allow_integration_in_goal_trajectories: true
      allow_nonzero_velocity_at_trajectory_end: false

      constraints:
        stopped_velocity_tolerance: 0.01
        goal_time: 1.0

  # ----- remote position controller (loaded inactive at boot) -----
  # F3 switches this atomically with arm_controller. Both claim the same six
  # position interfaces, so they can never be active at the same time.
  forward_position_controller:
    ros__parameters:
      joints:
        - joint1
        - joint2
        - joint3
        - joint4
        - joint5
        - joint6
      interface_name: position

  # ----- OM-X prismatic gripper, driven by Dynamixel ID 37 -----
  gripper_controller:
    ros__parameters:
      joint: gripper_left_joint
      state_interfaces:
        - position
      command_interfaces:
        - position
