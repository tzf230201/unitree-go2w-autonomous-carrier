om6dof_controller:
  ros__parameters:
    operation_mode_topic: /om6dof/operation_mode
    control_cmd_topic: /om6dof/control_cmd
    operation_mode_state_topic: /om6dof/operation_mode/state
    remote_enabled_state_topic: /om6dof/remote_enabled/state
    forward_command_topic: /forward_position_controller/commands
    joint_state_topic: /joint_states

    publish_rate_hz: 50.0
    joint_state_timeout_seconds: 1.0
    control_cmd_timeout_seconds: 0.3
    max_joint_command_velocity: 1.2

    ready_pose: [0.0, -0.6806, 1.3613, 0.0, 0.8901, 0.0]
    pose_target_velocity: 0.5
    pose_target_tolerance: 0.01
    pose_target_timeout_seconds: 20.0

    ik_enabled: true
    ik_base_link: world
    ik_tip_link: end_effector_link
    ik_urdf_pkg: om6dof_description
    ik_damping: 0.05
    max_cartesian_linear_velocity: 0.10
    max_cartesian_angular_velocity: 1.0
    max_cylindrical_theta_velocity: 0.5
    cylindrical_origin_xy: [0.012, 0.0]
    cylindrical_min_radius: 0.03
    ik_position_gain: 4.0
    ik_rotation_gain: 3.0
    ik_tool_frame_rotation: true
    ik_max_target_lead: 0.04
    ik_max_joint_following_error: 0.30
    ik_manipulability_warning_threshold: 1.0e-6
    ik_self_collision: true
    ik_collision_radius: 0.025
