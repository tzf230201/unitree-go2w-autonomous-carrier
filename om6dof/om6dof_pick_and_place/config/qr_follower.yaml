# QR/AprilTag follower parameters.
#
# The follower keeps the end effector 10 cm in front of the detected tag and
# aligns the end-effector frame with the tag plane. It consumes the same
# /apriltag/pose stream as tag_pick_place.

apriltag_detector:
  ros__parameters:
    width: 1280
    height: 720
    fps: 30
    depth_width: 1280
    depth_height: 720
    serial: "427622271962"
    tag_family: "36h11"
    tag_size: 0.03
    tag_id: 1
    corner_refine: "subpix"
    use_depth: true
    publish_debug: true
    terminal_log_period: 0.0
    show_window: false
    window_name: "OM6DOF QR Follower"
    window_width: 960
    window_height: 720
    exposure: 0

qr_follower:
  ros__parameters:
    tag_topic: "/apriltag/pose"
    reference_frame: "world"
    ee_link: "end_effector_link"
    arm_group: "arm"
    gripper_group: "gripper"

    # Wrist camera extrinsic, same starting point as tag_pick_place.
    camera_parent_frame: "end_effector_link"
    camera_xyz: [-0.08247, 0.00000, -0.00960]
    camera_rpy: [0.00000, -1.13450, 0.00000]

    # Keep the tool 10 cm in front of the QR/AprilTag face.
    follow_distance: 0.10

    # Tag frame -> EE frame. Default: preserve tag +X, flip +Y/+Z so EE +Z
    # points back toward the QR/tag face.
    ee_from_tag_rpy: [3.1416, 0.0, 0.0]

    auto_start: false
    command_period: 0.8
    min_samples: 4
    max_sample_age: 1.0
    position_deadband: 0.012
    orientation_deadband: 0.12
    min_z: 0.015
    max_z: 0.45

    vel_scale: 0.15
    acc_scale: 0.15
    planning_time: 3.0
    planning_attempts: 10
    position_tolerance: 0.02
    orientation_tolerance: 0.35
    marker_period: 0.2
