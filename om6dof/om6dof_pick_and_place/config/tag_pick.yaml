# AprilTag pick-and-place (level-1 PoC) — parameters for both nodes.
#
# Target object: 30 x 30 x 30 mm cube. A 36h11 AprilTag ID 1, printed at
# 30 x 30 mm, is attached to one cube face. The picker estimates the cube
# centre as 15 mm behind the tag plane:
#   object_center_from_tag: [0.00000, 0.00000, -0.01500]
#
# ⚠ camera_xyz / camera_rpy MUST be measured for your actual camera mount:
#   pose of the camera BODY frame (x out of the lens, y left, z up) relative
#   to the arm base (`world`, the bottom of link1). Verify with:
#       ros2 service call /tag_world std_srvs/srv/Trigger
#   → put the tag at a known spot, compare the reported x/y/z with a ruler.

apriltag_detector:
  ros__parameters:
    width: 1280             # D405 on USB 3.2 does 1280x720 @ 30 fps —
    height: 720             # more pixels on the tag = detection robust at
    fps: 30                 # distance and at oblique angles.
    depth_width: 1280
    depth_height: 720
    serial: "427622271962"  # ALOHA wrist cam: RealSense D405 (USB 3.2)
    tag_family: "36h11"
    tag_size: 0.03          # metres, outer black edge. Must match printout.
    tag_id: 1               # detect only the cube's AprilTag ID 1
    corner_refine: "subpix" # ~25 ms/frame → full 15 fps on the Orin.
                            # "apriltag" is more robust for tiny/blurry tags
                            # but ~195 ms/frame → only ~5 fps. If the pose
                            # gets jittery, switch back to "apriltag".
    use_depth: true
    publish_debug: true
    terminal_log_period: 0.0
    show_window: true
    window_name: "OM6DOF AprilTag"
    window_width: 960
    window_height: 720
    exposure: 0             # 0 = auto. The D405 handled the tag fine on auto
                            # (the old manual 80 was tuned for the D435i and —
                            # due to a sensor-name bug — never actually applied
                            # to the D405). Set >0 only if glare comes back.

tag_pick_place:
  ros__parameters:
    # --- camera extrinsic ---
    # Same model as open_manipulator_6dof_application:
    # camera body frame is mounted on the wrist/end effector, not fixed in world.
    camera_parent_frame: "end_effector_link"
    # ALOHA wrist-cam extrinsic (RealSense D405 in the ALOHA mount), converted
    # from google-deepmind/mujoco_menagerie `aloha`: gripper_base -> wrist_cam
    # pos=(0, -0.08247, -0.00960), euler_x=2.70526 rad — camera hangs 8.2 cm
    # to the side of the gripper axis and looks 25 deg inward at the fingers.
    # NOTE: vx300s gripper_base origin != our end_effector_link origin, so
    # fine-tune xyz with the calib GUI (port 8081) after this starting point.
    camera_xyz: [-0.08247, 0.00000, -0.00960]  # m, parent -> camera body
    camera_rpy: [0.00000, -1.13450, 0.00000]   # rad, parent -> camera body

    # --- grasp generation ---
    cube_size: 0.03         # 30 mm cube
    object_center_from_tag: [0.00000, 0.00000, -0.01500]
                            # vector from tag centre to cube centre in the
                            # tag frame. With the printed face visible, +Z
                            # points out of the paper, so the cube centre is
                            # 15 mm behind the tag plane. If /tag_world shows
                            # the centre on the wrong side, flip the sign.
    approach_offset: 0.15   # hover height above the cube centre (m)
    grasp_offset: -0.030    # EE height relative to cube centre at grasp (m).
                            # TUNE on hardware because end_effector_link is
                            # not exactly the same point as the fingertips.
    # --- FRONT pick (default): approach horizontally from the front,
    # refine with the wrist camera, then advance and grasp. IK map
    # 2026-07-09: frontal pitch pi/2 roll 0 feasible at object height ~0.20 m
    # (r 0.14-0.30); lower objects need r~0.30 or nose-down pitch fallback.
    pick_mode: "front"          # "front" | "top"
    front_standoff: 0.10        # berhenti 10 cm di depan objek
    front_approach_z_offset: 0.04  # naikkan approach/standoff 4 cm dari z objek
    front_grasp_back: 0.005     # EE berhenti 5 mm sebelum pusat kubus
    front_pitch: 1.5708         # pi/2 = gripper horizontal
    front_pitch_fallbacks: [1.5708, 1.72, 1.87, 2.0]
    front_refine_max_iters: 4
    front_refine_tolerance: 0.008   # selesai bila koreksi < 8 mm
    front_refine_pos_tol: 0.006     # toleransi MoveIt saat refine/advance
    front_refine_settle: 0.6        # detik tunggu deteksi segar tiap iterasi

    # --- TOP pick (pick_mode: "top") ---
    # IK feasibility map (measured 2026-07-08, /compute_ik sweeps at the real
    # object bearing):
    #   * top-down (pi) IS feasible, but ONLY low: z <= ~0.06 m, r 0.08-0.20
    #   * at hover height (z ~0.12-0.16) only tilted pitch 2.1-2.4 works
    # So: HOVER tilted (approach_pitch), DESCEND+GRASP top-down (grasp_pitch).
    approach_pitch: 2.4     # ~137 deg tilted hover
    approach_pitch_fallbacks: [2.4, 2.2, 2.6, 2.0, 1.8]
    grasp_pitch: 3.1416     # pi = grasp straight down (feasible at low z)
    grasp_pitch_fallbacks: [3.1416, 2.9, 2.7, 2.4]
    approach_extra_heights: [0.0, -0.04, 0.04]
    approach_orientation_tolerance: 0.9
    grasp_orientation_tolerance: 0.7
    yaw_offset: 0.0         # added to the radial yaw
    min_z: 0.002            # never command the EE below this (m)
    min_samples: 5
    max_sample_age: 1.5
    stabilize_before_pick: true
    stabilize_timeout: 4.0
    stabilize_duration: 0.8
    stabilize_required_samples: 10
    stabilize_position_tolerance: 0.02

    # --- search / feedback gestures ---
    search_enabled: true
    search_timeout: 32.0
    search_hold_sec: 0.9
    search_waypoints:
      - search_center
      - search_left
      - search_right
      - search_high
      - search_low
      - search_lower
      - search_far
      - search_far_left
      - search_far_right
      - search_far_lower
      - search_far_lower_left
      - search_far_lower_right
      - search_floor
      - search_floor_left
      - search_floor_right
      - search_center
    not_found_nod_enabled: true
    not_found_nod_waypoints:
      - nod_down
      - nod_up
      - nod_down
      - nod_up
      - search_center
    success_circle_enabled: true
    success_circle_waypoints:
      - circle_1
      - circle_2
      - circle_3
      - circle_4
      - circle_5

    # --- motion / gripper ---
    vel_scale: 0.2
    acc_scale: 0.2
    position_tolerance: 0.03
    orientation_tolerance: 0.5
    planning_time: 4.0      # shorter per-candidate budget → the pitch/height
                            # fallback chain cycles quickly instead of
                            # spending 10 s on each infeasible orientation
    planning_attempts: 20
    gripper_open_pos: 0.019
    gripper_close_pos: -0.010
    auto_run: false         # true = start after launch, like pressing START
    auto_run_delay: 8.0

    # --- application-like sequence start ---
    prepare_before_search: true
    prepare_waypoint: start_pose
    open_gripper_before_search: true

coord_debug:
  ros__parameters:
    tag_topic: "/apriltag/pose"
    object_source: "apriltag"
    perception_topic: "/om6dof_perception/target_point"
    perception_max_spread: 0.025
    perception_world_min: [0.08, -0.35, -0.08]
    perception_world_max: [0.45, 0.35, 0.45]
    enable_robot_debug: true
    joint_state_topic: "/joint_states"
    reference_frame: "world"
    ee_link: "end_effector_link"
    camera_parent_frame: "end_effector_link"
    arm_joint_names: ["joint1", "joint2", "joint3", "joint4", "joint5", "joint6"]
    gripper_joint_names: ["gripper_left_joint", "gripper_right_joint"]
    camera_xyz: [-0.08247, 0.00000, -0.00960]
    camera_rpy: [0.00000, -1.13450, 0.00000]
    cube_size: 0.03
    object_center_from_tag: [0.00000, 0.00000, -0.01500]
    log_period: 0.5
    live_console: true
    marker_period: 0.2
    max_tag_age: 2.0

# --- Direct Servo pick flow: sequencer + web GUI share the same
# camera extrinsic as above. calib_gui's SAVE rewrites every camera_xyz/
# camera_rpy/object_center_from_tag line in this file, so all sections
# stay in sync.
direct_pick:
  ros__parameters:
    camera_xyz: [-0.08247, 0.00000, -0.00960]
    camera_rpy: [0.00000, -1.13450, 0.00000]
    object_center_from_tag: [0.00000, 0.00000, -0.01500]
    tag_topic: "/apriltag/pose"
    arm_joint_names: ["joint1", "joint2", "joint3", "joint4", "joint5", "joint6"]
    # The calibrated world origin is above the support surface.  A detected
    # object's centre may therefore be slightly below z=0 and is still valid.
    perception_world_min: [0.08, -0.35, -0.08]
    perception_world_max: [0.50, 0.35, 0.45]
    front_standoff: 0.05        # maju ~5 cm (dulu 10 cm)
    front_approach_z_offset: 0.04
    front_grasp_back: 0.005
    approach_offset: [0.08000, 0.00000]   # depan objek pada tinggi grasp; advance lurus
    pick_offset: [0.07000, 0.00000]     # [maju(+dalam), naik(+atas)] koreksi genggam
    front_pitch: 1.5708
    front_pitch_fallbacks: [1.5708, 1.65, 1.72, 1.8, 1.9, 2.0, 2.1, 2.2, 2.3, 2.4, 1.4, 1.2]
    approach_upright_pitch_max: 2.0  # cegah pendekatan memakai pose terbalik
    advance_step_m: 0.015       # waypoint 1.5 cm agar gerak masuk hampir lurus
    align_position_tolerance: 0.006
    align_orientation_tolerance: 0.10
    advance_position_tolerance: 0.004
    advance_orientation_tolerance: 0.10
    tracking_rate_hz: 5.0
    tracking_gain: 0.45
    tracking_yaw_sign: -1.0
    tracking_deadband_rad: 0.045
    tracking_max_step_rad: 0.05
    tracking_trajectory_s: 0.30
    tracking_target_timeout_s: 0.60
    tracking_joint1_min: -2.60
    tracking_joint1_max: 2.60
    tracking_vertical_gain: 0.35
    tracking_pitch_sign: 1.0
    tracking_vertical_deadband_rad: 0.045
    tracking_vertical_max_step_rad: 0.04
    tracking_joint5_min: -1.80
    tracking_joint5_max: 1.80
    pickup_tracking_enabled: true
    pickup_tracking_timeout_s: 8.0
    pickup_tracking_stable_cycles: 3
    pickup_object_refresh_timeout_s: 2.0
    pickup_coarse_standoff_m: 0.16
    pickup_approach_step_m: 0.04
    pickup_min_approach_radius_m: 0.28  # hindari link7-link4 terlipat dekat base
    pickup_optical_depth_min_m: 0.05
    pickup_optical_depth_max_m: 1.00
    lift_after_grasp: 0.05
    min_z: -0.02             # world origin di atas meja; tetap ~7 cm di atas table
    ready_pose: [0.0, -0.6806, 1.3613, 0.0, 0.8901, 0.0]
    # Joint pose lokasi drop: sisi kiri robot. Object tetap dijepit selama
    # transfer dan baru dilepas setelah pose ini benar-benar tercapai.
    place_pose: [1.2, -0.5, 1.2, 0.0, 0.9, 0.0]
    gripper_open: 0.019
    gripper_close: -0.010
    gripper_settle_s: 1.2
    joint_move_duration: 4.0    # min-jerk quintic; ready/origin/place in 4 s
    joint_move_rate: 50.0

calib_gui:
  ros__parameters:
    port: 8081
    camera_parent_frame: "end_effector_link"
    camera_xyz: [-0.08247, 0.00000, -0.00960]
    camera_rpy: [0.00000, -1.13450, 0.00000]
    object_center_from_tag: [0.00000, 0.00000, -0.01500]
    approach_offset: [0.08000, 0.00000]
    pick_offset: [0.07000, 0.00000]
    arm_joint_names: ["joint1", "joint2", "joint3", "joint4", "joint5", "joint6"]
